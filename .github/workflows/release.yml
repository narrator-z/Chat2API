name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-latest
            arch: x64
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build application
        run: npm run build

      - name: Fix script permissions
        run: |
          chmod +x scripts/*.sh
          chmod +x build/*.sh

      - name: Build and Publish (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Update package.json version
          npm version ${{ github.event.inputs.version }} --allow-same-version --no-git-tag-version
          npx electron-builder --mac --${{ matrix.arch }} --publish=onTag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build and Publish (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Update package.json version
          npm version ${{ github.event.inputs.version }} --allow-same-version --no-git-tag-version
          npx electron-builder --win --${{ matrix.arch }} --publish=onTag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build and Publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Update package.json version
          npm version ${{ github.event.inputs.version }} --allow-same-version --no-git-tag-version
          npx electron-builder --linux --${{ matrix.arch }} --publish=onTag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
